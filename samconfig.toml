# samconfig.toml — SAM deployment configuration
# This file is auto-generated by `sam deploy --guided`.
# Replace the placeholder values below before deploying.
# IMPORTANT: Do NOT commit real tokens or IDs to source control.

version = 0.1

[default]
[default.deploy]
[default.deploy.parameters]
stack_name          = "WordleReminderDiscordBot"
s3_bucket           = "YOUR_SAM_DEPLOYMENT_BUCKET"
s3_prefix           = "WordleReminderDiscordBot"
region              = "us-east-1"
confirm_changeset   = true
capabilities        = "CAPABILITY_IAM"

parameter_overrides = [
  "DiscordToken=YOUR_DISCORD_BOT_TOKEN",
  "ChannelId=YOUR_CHANNEL_ID",
  "UserIds=USER_ID_1,USER_ID_2,USER_ID_3",
  "Schedule=cron(0 21 * * ? *)",
  "DebugMessages=true"
]

name: Debug Discord Channel Messages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Invoke Lambda in debug-only mode
        run: |
          RESPONSE=$(aws lambda invoke \
            --function-name WordleReminderBot \
            --cli-binary-format raw-in-base64-out \
            --payload '{"debug_only": true}' \
            --log-type Tail \
            /tmp/lambda-response.json)
          echo "=== Lambda response ==="
          cat /tmp/lambda-response.json
          echo ""
          echo "=== CloudWatch log tail ==="
          echo "$RESPONSE" \
            | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d.get('LogResult','')).decode())"
